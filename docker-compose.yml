version: '3.9'

services:
  backend:
    build:
      context: ./backend
    container_name: hipaa_deid_backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data

  frontend:
    build:
      context: ./frontend
    container_name: hipaa_deid_frontend
    depends_on:
      - backend
    environment:
      - BACKEND_URL=http://backend:8000/deidentify
    ports:
      - "7860:7860"
